[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; 加入這兩行
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, colorize
board_build.filesystem = littlefs

lib_deps =
    bogde/HX711
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9

; Static analysis (`pio check`) — keep CI and local runs in sync
check_tool = cppcheck
check_severity = high
check_skip_packages = yes
check_src_filters =
    +<src/>
    +<include/>
; cppcheck cannot expand ArduinoJson's macros and emits a false
; preprocessorErrorDirective; ignore anything under library deps.
check_flags =
    cppcheck: --suppress=*:*/libdeps/*