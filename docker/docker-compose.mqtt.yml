# ESP32 Weight Scale – MQTT Stack
#
# Services:
#   mosquitto  – MQTT broker  host:1884 → container:1883
#   nodered    – Node-RED dashboard (port 1880)
#
# Port 1884 is used on the host to avoid conflicts with other MQTT brokers
# (e.g. an existing broker already mapped to host port 1885).
# Node-RED connects to mosquitto internally via the Docker network on port 1883.
# The ESP32 firmware must use MQTT_BROKER_PORT = 1884 (set in include/config.h).
#
# First run (builds the Node-RED image with dashboard plugin):
#   docker compose -f docker/docker-compose.mqtt.yml up -d --build
#
# Subsequent runs (uses cached image):
#   docker compose -f docker/docker-compose.mqtt.yml up -d
#
# Dashboard URL:
#   http://localhost:1880/ui
#
# NOTE: This file lives under docker/ and is never touched by PlatformIO.

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: esp32-mosquitto
    ports:
      - "1884:1883"   # MQTT (TCP)  host 1884 → container 1883
      - "9002:9001"   # MQTT over WebSocket  host 9002 → container 9001
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  nodered:
    build: ./nodered          # custom image with node-red-dashboard pre-installed
    container_name: esp32-nodered
    ports:
      - "1880:1880"
    environment:
      - TZ=Asia/Taipei
    volumes:
      - ../nodered_data:/data      # reuse the existing nodered_data folder
    depends_on:
      - mosquitto
    restart: unless-stopped
