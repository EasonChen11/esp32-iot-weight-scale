# Mosquitto configuration for ESP32 Weight Scale
# Allows anonymous connections on the local network.
# Harden this file (add password_file) for production use.

# Plain MQTT listener
listener 1883
allow_anonymous true

# WebSocket listener (for browser-based MQTT clients)
listener 9001
protocol websockets
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
